# =============================================================================
# EXAMPLE CONFIGURATION - Getting Started Template
# =============================================================================
# This file is provided as a starting point for deployments. It should be
# reviewed and modified to match your specific infrastructure requirements,
# security policies, and operational needs before use in production.
# =============================================================================
#
# HOST REQUIREMENTS
# -----------------
# - vm.max_map_count >= 262144 (recommended by OpenSearch/Lucene)
#     sysctl -w vm.max_map_count=262144
#     echo "vm.max_map_count = 262144" >> /etc/sysctl.d/99-opensearch.conf
#
# DEPLOYMENT STRATEGIES
# ---------------------
# Single-replica OpenSearch uses a Deployment with Recreate strategy to
# prevent two pods from competing for the same data volume. When
# opensearch.replicaCount > 1 the chart switches to a StatefulSet with
# per-pod PVCs (via volumeClaimTemplates), which supports multi-node
# clustering. Trivy and DependencyTrack keep the Recreate strategy for
# the same single-writer PVC reason.
#
# IMAGE TAGS
# ----------
# The backend/web/edge image tag is load-bearing: when image.tag is left
# empty (""), the chart falls back to the chart's appVersion, so a given
# chart release is reproducible. `helm install foo --version 1.2.3` then
# pulls image tag 1.2.3 without any extra wiring. Bumping appVersion in
# Chart.yaml auto-pins any component whose tag is left empty.
#
# This development profile keeps an explicit floating tag instead:
#   - "dev" follows the latest build from main (backend/web/edge here)
#   - values-production.yaml pins "latest" (the most recent release)
# An explicit tag always wins over the appVersion fallback. Leave a tag
# empty only when you want it to track appVersion (handy for tagged
# chart releases). ArgoCD Image Updater pins floating tags to specific
# digests so rollouts stay deterministic. For manual deploys with a
# floating tag, set imagePullPolicy: Always so restarts pick up new builds.
#
# RESOURCE SIZING
# ---------------
# These defaults target a single-node dev cluster. For production sizing,
# see values-production.yaml. Key considerations:
# - OpenSearch JVM heap is fixed via OPENSEARCH_JAVA_OPTS (-Xms/-Xmx).
#   The container memory limit must be roughly 2x the heap to leave room
#   for off-heap/Lucene page cache.
# - DependencyTrack needs 4Gi+ to load its vulnerability database.
# - Backend memory scales with concurrent uploads and scan activity.
#
# =============================================================================

# Default values for artifact-keeper (development profile)

global:
  # Container registry prefix. Default is ghcr.io.
  # For Docker Hub, change to: docker.io/artifactkeeper
  imageRegistry: ghcr.io/artifact-keeper
  imagePullPolicy: Always
  storageClass: standard

  # -- Scheduling constraints applied to ALL workloads by default.
  # Per-component values (e.g. backend.nodeSelector) override these.
  #
  # NOTE: Per-component values fully replace global, they do not merge.
  # Setting backend.tolerations means the backend gets only those tolerations,
  # not global + backend combined. There is currently no way to opt a single
  # component out of global scheduling without setting its own values.
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []

nameOverride: ""
fullnameOverride: ""

# -- Cosign image signature verification
# When enabled, an init container verifies the backend image signature
# before the pod starts. Uses sigstore keyless verification (GitHub OIDC).
cosign:
  enabled: false
  image:
    repository: gcr.io/projectsigstore/cosign
    tag: v2.4.1
  # OIDC issuer and identity for keyless verification
  certificateOidcIssuer: "https://token.actions.githubusercontent.com"
  certificateIdentityRegexp: "https://github.com/artifact-keeper/.*"

# -- Backend API server
# The backend handles all API requests, format-specific wire protocols,
# and artifact storage. It runs as a single Rust binary (Axum).
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/artifact-keeper/artifact-keeper-backend  # Docker Hub: artifactkeeper/backend
    # -- "dev" is a floating tag built from main. Leave this empty ("") to
    # inherit the chart's appVersion instead (see the IMAGE TAGS note at the
    # top of this file). ArgoCD Image Updater pins floating tags to a digest
    # automatically. For manual deploys with a floating tag, consider a
    # specific version tag (e.g. 1.1.0) or set pullPolicy: Always.
    tag: dev
    pullPolicy: Always
  # -- Pod-level securityContext. Defaults are image-native: the backend
  # image bakes the Grype vulnerability DB at /home/artifact/.cache/grype
  # with ownership 1001:0 (see artifact-keeper docker/Dockerfile.backend).
  # The pod MUST run as UID 1001 or Grype hits EACCES on the DB. fsGroup
  # only chowns mounted volumes -- it does NOT touch the image's root
  # filesystem -- so changing runAsUser away from 1001 will break scans
  # even if fsGroup matches.
  #
  # If you are upgrading from chart <= 1.x where this defaulted to
  # 1000:1000, your storage/scan-workspace PVCs will be recursively
  # chowned on first remount because fsGroup changed. That takes ~1s per
  # GiB of artifact data. See UPGRADE-NOTES.md.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 0
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  initContainerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  service:
    type: ClusterIP
    httpPort: 8080
    grpcPort: 9090
  # -- Unauthenticated Prometheus metrics listener.
  # When enabled, the backend starts a second TCP listener on `metricsPort`
  # serving only `GET /metrics` with no authentication. Intended for
  # Prometheus scrapers that cannot present credentials. Disabled by default.
  #
  metricsListener:
    enabled: false
    port: 9091
  env:
    RUST_LOG: "info,artifact_keeper=debug"
    HOST: "0.0.0.0"
    PORT: "8080"
    STORAGE_PATH: "/data/storage"
    BACKUP_PATH: "/data/backups"
    PLUGINS_DIR: "/data/plugins"
    ENVIRONMENT: "development"
    ADMIN_PASSWORD: ""

    # -- Server
    # GRPC_PORT: "9090"
    # SKIP_MIGRATIONS: "false"
    # CORS_ORIGINS: ""
    # DEMO_MODE: "false"
    # ALLOW_LOCAL_ADMIN_LOGIN: "false"

    # -- Storage
    # STORAGE_BACKEND: "filesystem"
    # STORAGE_PATH_FORMAT: "native"
    # S3_BUCKET: ""
    # S3_REGION: "us-east-1"
    # S3_ENDPOINT: ""
    # S3_PREFIX: ""
    # S3_REDIRECT_DOWNLOADS: "false"
    # S3_PRESIGN_EXPIRY_SECS: "3600"
    # S3_CA_CERT_PATH: ""
    # S3_INSECURE_TLS: "false"
    # GCS_BUCKET: ""
    # GCS_PROJECT_ID: ""
    # GCS_SERVICE_ACCOUNT_EMAIL: ""
    # GCS_PRIVATE_KEY_PATH: ""
    # GCS_REDIRECT_DOWNLOADS: "false"
    # GCS_SIGNED_URL_EXPIRY: "3600"
    # AZURE_STORAGE_ACCOUNT: ""
    # AZURE_STORAGE_CONTAINER: ""
    # AZURE_STORAGE_ACCESS_KEY: ""
    # AZURE_REDIRECT_DOWNLOADS: "false"
    # AZURE_SAS_EXPIRY: "3600"

    # -- Presigned Downloads
    # PRESIGNED_DOWNLOADS_ENABLED: "false"
    # PRESIGNED_DOWNLOAD_EXPIRY_SECS: "300"

    # -- CloudFront CDN (S3 storage backends)
    # CLOUDFRONT_DISTRIBUTION_URL: ""
    # CLOUDFRONT_KEY_PAIR_ID: ""
    # CLOUDFRONT_PRIVATE_KEY_PATH: ""

    # -- Database Connection Pool
    # DATABASE_MAX_CONNECTIONS: "20"
    # DATABASE_MIN_CONNECTIONS: "5"
    # DATABASE_ACQUIRE_TIMEOUT_SECS: "30"
    # DATABASE_IDLE_TIMEOUT_SECS: "600"
    # DATABASE_MAX_LIFETIME_SECS: "1800"

    # -- Authentication
    # JWT_EXPIRATION_SECS: "86400"
    # JWT_ACCESS_TOKEN_EXPIRY_MINUTES: "30"
    # JWT_REFRESH_TOKEN_EXPIRY_DAYS: "7"
    # SKIP_ADMIN_PROVISIONING: "false"
    # SSO_ENCRYPTION_KEY: ""

    # -- OIDC
    # OIDC_ISSUER: ""
    # OIDC_CLIENT_ID: ""
    # OIDC_CLIENT_SECRET: ""

    # -- LDAP
    # LDAP_URL: ""
    # LDAP_BASE_DN: ""
    # LDAP_BIND_DN: ""
    # LDAP_BIND_PASSWORD: ""
    # LDAP_USER_FILTER: "(uid={username})"
    # LDAP_USERNAME_ATTR: "uid"
    # LDAP_EMAIL_ATTR: "mail"
    # LDAP_DISPLAY_NAME_ATTR: "cn"
    # LDAP_GROUPS_ATTR: "memberOf"
    # LDAP_GROUP_ROLE_MAP: ""
    # LDAP_ADMIN_GROUP_DN: ""
    # LDAP_USE_STARTTLS: "false"
    # LDAP_CA_CERT_PATH: ""
    # LDAP_INSECURE_TLS: "false"

    # -- Password & Account Security
    # ACCOUNT_LOCKOUT_THRESHOLD: "5"
    # ACCOUNT_LOCKOUT_DURATION_MINUTES: "30"
    # PASSWORD_HISTORY_COUNT: "0"
    # PASSWORD_EXPIRY_DAYS: "0"
    # PASSWORD_MIN_LENGTH: "8"
    # PASSWORD_MAX_LENGTH: "128"
    # PASSWORD_REQUIRE_UPPERCASE: "false"
    # PASSWORD_REQUIRE_LOWERCASE: "false"
    # PASSWORD_REQUIRE_DIGIT: "false"
    # PASSWORD_REQUIRE_SPECIAL: "false"
    # PASSWORD_MIN_STRENGTH: "0"

    # -- Rate Limiting
    # RATE_LIMIT_AUTH_PER_MIN: "120"
    # RATE_LIMIT_API_PER_MIN: "5000"
    # RATE_LIMIT_WINDOW_SECS: "60"
    # RATE_LIMIT_EXEMPT_USERNAMES: ""
    # RATE_LIMIT_EXEMPT_SERVICE_ACCOUNTS: "false"

    # -- Proxy Stampede Protection (remote/proxy repository upstream fetch limiter)
    # Bounds peak concurrent in-flight upstream fetches across all remote
    # repos. Prevents thundering-herd against upstream registries (PyPI,
    # Maven Central, npm, Docker Hub, etc.) when many clients race for the
    # same uncached artifact. When the queue saturates, requests return
    # 503 Service Unavailable so clients back off rather than block.
    #
    # Operator dashboards: ak_proxy_upstream_inflight (gauge),
    # ak_proxy_queue_full_total (counter), ak_proxy_queue_wait_seconds
    # (histogram). A sustained queue_full rate signals undersized cap.
    #
    # PROXY_MAX_CONCURRENT_FETCHES: "20"   # Concurrent upstream fetch cap (default: 20).
    #                                      # Set to "0" to DISABLE the limiter
    #                                      # entirely (kill switch). Logs a
    #                                      # startup warning when disabled.
    # PROXY_QUEUE_TIMEOUT_SECS: "10"       # Per-request queue wait budget (default: 10).

    # -- Security Scanning
    # OPENSCAP_PROFILE: "xccdf_org.ssgproject.content_profile_standard"
    # GITHUB_TOKEN: ""
    # QUARANTINE_ENABLED: "false"
    # QUARANTINE_DURATION_MINUTES: "60"

    # -- Network Security
    # ALLOW_HTTP_INTEGRATIONS: "false"
    # CUSTOM_CA_CERT_PATH: ""

    # -- Peer Mesh
    # PEER_INSTANCE_NAME: ""
    # PEER_PUBLIC_ENDPOINT: ""
    # PEER_API_KEY: ""
    # SYNC_CHUNKED_THRESHOLD_BYTES: "104857600"
    # SYNC_CHUNK_SIZE_BYTES: "52428800"

    # -- OpenTelemetry
    # OTEL_EXPORTER_OTLP_ENDPOINT: ""
    # OTEL_SERVICE_NAME: "artifact-keeper"

    # -- Observability
    # METRICS_PORT: ""

    # -- Upload Limits
    # MAX_UPLOAD_SIZE: "10737418240"

    # -- Scheduled Tasks
    # GC_SCHEDULE: "0 0 * * * *"
    # LIFECYCLE_CHECK_INTERVAL_SECS: "60"

    # -- SMTP Email Delivery (disabled when SMTP_HOST is unset)
    # SMTP_HOST: ""
    # SMTP_PORT: "587"
    # SMTP_USERNAME: ""
    # SMTP_FROM_ADDRESS: "noreply@artifact-keeper.local"
    # SMTP_TLS_MODE: "starttls"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
      ephemeral-storage: 1Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  scanWorkspace:
    enabled: true
    size: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  # -- Per-component scheduling (overrides global)
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []
  serviceAccount:
    create: true
    annotations: {}
    name: ""

# -- Next.js web frontend
web:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/artifact-keeper/artifact-keeper-web  # Docker Hub: artifactkeeper/web
    # -- "dev" floating tag for the development profile. Leave empty ("") to
    # inherit the chart's appVersion (see backend.image.tag).
    tag: dev
    pullPolicy: Always
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_API_URL: ""
    NODE_ENV: "production"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 2Gi

  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  # -- Per-component scheduling (overrides global)
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []

# -- Edge replication service
# NOTE: The ghcr.io/artifact-keeper/artifact-keeper-edge image is not yet
# published. Setting edge.enabled: true will fail because the image cannot be
# pulled. Airgap operators should exclude this component from pre-pull lists
# until the edge image ships. Tracking: issue #56.
edge:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/artifact-keeper/artifact-keeper-edge
    # -- "dev" floating tag. Kept explicit (not empty) on purpose: the edge
    # image is not published at the chart's appVersion yet, so inheriting
    # appVersion would reference an image that does not exist. See the edge
    # note above and issue #56. Leave empty ("") only once edge ships at the
    # chart's appVersion.
    tag: dev
    pullPolicy: Always
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  service:
    type: ClusterIP
    port: 8081
  env:
    RUST_LOG: "info,artifact_keeper_edge=debug"
    EDGE_HOST: "0.0.0.0"
    EDGE_PORT: "8081"
    CACHE_SIZE_MB: "10240"
    HEARTBEAT_INTERVAL_SECS: "30"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  # -- Per-component scheduling (overrides global)
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []

# -- PostgreSQL (in-cluster, disable for external/RDS)
# For production, set postgres.enabled=false and configure externalDatabase
# to point at a managed database (RDS, Cloud SQL, etc.). The in-cluster
# instance is suitable for dev/testing only.
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
  containerSecurityContext: {}
  auth:
    username: registry
    password: ""
    database: artifact_registry
  persistence:
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 512Mi
  initDb:
    enabled: true
  # -- Per-component scheduling (overrides global)
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []

# -- External database (used when postgres.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  username: ""
  password: ""
  database: "artifact_registry"
  existingSecret: ""
  existingSecretKey: "DATABASE_URL"

# -- OpenSearch (full-text search engine)
# Powers full-text artifact search. The backend auto-reindexes from
# Postgres on first boot, so there is no data migration required when
# enabling OpenSearch on a fresh install.
#
# Deployment mode:
# - replicaCount: 1 (default) renders a single-node Deployment with
#   discovery.type=single-node, suitable for dev and small installs.
# - replicaCount: >= 2 renders a StatefulSet with per-pod PVCs and sets
#   cluster.initial_cluster_manager_nodes for multi-node bootstrapping.
#   Use this for staging/production.
#
# Security:
# - disableSecurityPlugin: true is the simplest option and is the default
#   for the example template. The backend talks plain HTTP on port 9200.
# - disableSecurityPlugin: false enables the OpenSearch Security plugin.
#   You must then provide auth.username/auth.password and configure real
#   TLS certificates. The default demo config is always disabled
#   (DISABLE_INSTALL_DEMO_CONFIG=true) so you do not ship demo certs
#   into production by accident.
opensearch:
  enabled: true
  replicaCount: 1
  clusterName: artifact-keeper
  image:
    repository: opensearchproject/opensearch
    # -- Pin to a specific patch for stability. 2.19.1 matches the
    # version the backend is tested against.
    tag: 2.19.1
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  # -- readOnlyRootFilesystem is false because OpenSearch writes config
  # and lock files outside its data volume on startup.
  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # -- Applies to the sysctl-check init container. The fix-ownership
  # init container has separate root + CHOWN/FOWNER requirements,
  # configured under `opensearch.fixOwnership.securityContext`.
  initContainerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  fixOwnership:
    enabled: true
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        add:
          - CHOWN
          - FOWNER
  # -- JVM heap sizing. Keep Xms == Xmx. The container memory limit
  # should be roughly 2x the heap to leave room for off-heap and page cache.
  javaOpts: "-Xms512m -Xmx512m"
  # -- When true, the Security plugin is disabled and the backend talks
  # plain HTTP. Set to false for staging/production (see README for
  # cert-manager setup).
  disableSecurityPlugin: true
  # -- Backend-side TLS verification toggle. Leave true for self-signed
  # certs in development; set to false once real certs are in place.
  allowInvalidCerts: true
  # -- Admin credentials used when disableSecurityPlugin is false.
  # Ignored otherwise. Override via --set or externalSecrets in production.
  auth:
    username: "admin"
    # -- OpenSearch 2.12+ requires a strong initial admin password.
    password: "ArtifactKeeper2026!Strong"
  persistence:
    # -- When false and replicaCount == 1, data lives in an emptyDir
    # sized according to `size`. Set to true (and configure storageClass)
    # for any install that must survive pod restarts.
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
      ephemeral-storage: 128Mi
    limits:
      cpu: "2"
      # -- Must be roughly 2x the JVM heap in javaOpts.
      memory: 2Gi
      ephemeral-storage: 512Mi
  # -- Per-component scheduling (overrides global)
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []

# -- Trivy vulnerability scanner
# Runs as a persistent server that the backend calls for image/SBOM scans.
# Uses a PVC for its vulnerability database cache. The deployment uses
# Recreate strategy because the cache directory uses a file lock that
# prevents concurrent access from two pods.
trivy:
  enabled: true
  image:
    repository: aquasec/trivy
    tag: "0.62.1"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10000
    fsGroup: 10000
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  initContainerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # -- Vulnerability database settings.
  # Trivy downloads its vulnerability DB lazily (on first scan), pulling an OCI
  # artifact from a registry. The upstream default (ghcr.io/aquasecurity/trivy-db)
  # is anonymous-pull and gets rate-limited; clusters that cannot reach it (or that
  # hit the rate limit) end up with no DB, which fails the pinned-cve-gate pre-flight.
  # To make the fetch reliable we (a) point at a configurable mirror and (b) pre-seed
  # the DB with an init container so it is present before the server accepts scans.
  db:
    # -- OCI repository for the vulnerability DB. Override to an internal mirror the
    # cluster can reach. Default empty means Trivy uses its built-in ghcr.io default,
    # which has historically been the only reliably-reachable source from our gate
    # cluster. mirror.gcr.io was tried in #136 but caused the server to hang at
    # Available 0/1 even with preseed off (see artifact-keeper-iac #140), so the
    # mirror is now opt-in by override rather than the default.
    repository: ""
    # -- OCI repository for the Java DB (used by jar/war scanning). Same opt-in
    # semantics as `repository` above.
    javaRepository: ""
    # -- Run an init container that downloads the DB into the cache PVC before the
    # server starts. Makes the DB present on rollout instead of on first scan.
    # Default OFF because the preseed download from mirror.gcr.io can exceed Helm's
    # default install timeout in some clusters, leaving the Trivy Deployment stuck
    # at Available 0/1 (see artifact-keeper-iac #137). The server still fetches the
    # DB lazily on first scan via TRIVY_DB_REPOSITORY, so this is opt-in for now.
    preseed:
      enabled: false
    # -- Skip the periodic in-server DB refresh. Leave false so the server keeps the
    # DB fresh from the configured mirror; set true for fully air-gapped clusters
    # where the DB is seeded out of band.
    skipUpdate: false
  persistence:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: "1"
      memory: 2Gi
      ephemeral-storage: 1Gi
  # -- Per-component scheduling (overrides global)
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []

# -- DependencyTrack SBOM analysis
# Provides SBOM ingestion, license analysis, and vulnerability correlation.
# Requires significant memory (4Gi+) to load its internal vulnerability
# database on startup. The bootstrap init container creates the initial
# admin user and API key for backend integration.
dependencyTrack:
  enabled: true
  image:
    repository: dependencytrack/apiserver
    tag: "4.11.4"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  initContainerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  adminPassword: ""
  # -- Size limit for the `/tmp` emptyDir volume. DependencyTrack writes
  # ~1-2Gi into /tmp during startup (NVD mirror sync, DB migrations, JVM
  # working files), so the default is sized to fit. Operators on
  # constrained nodes can tune this down; an empty string falls back to
  # the 2Gi default in the deployment template.
  tmpSizeLimit: "2Gi"
  persistence:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
      ephemeral-storage: 256Mi
    limits:
      cpu: "2"
      memory: 6Gi
      ephemeral-storage: 1Gi
  bootstrap:
    enabled: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  # -- Per-component scheduling (overrides global)
  tolerations: []
  affinity: {}
  nodeSelector: {}
  topologySpreadConstraints: []

# -- Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
  host: artifacts.example.com
  tls:
    enabled: true
    secretName: artifact-keeper-tls

# -- Secrets
# These are development defaults. For production, override via --set or
# use existingSecret references. Never commit real credentials here.
secrets:
  jwtSecret: ""
  s3AccessKey: ""
  s3SecretKey: ""
  # SMTP password (only used when backend.env.SMTP_HOST is set)
  smtpPassword: ""
  # Migration encryption key — required at runtime by the backend to
  # encrypt source-connection credentials in the migration_jobs table.
  # Without it, POST /api/v1/migrations/connections returns 500. Should
  # be a random 32-byte value (e.g. `openssl rand -hex 32`). Leave empty
  # to skip the env var entirely (migration features will return 500).
  migrationEncryptionKey: ""

# -- External Secrets Operator
# When enabled, ExternalSecret CRDs replace the static Secret template.
# Requires External Secrets Operator installed on the cluster and a
# SecretStore or ClusterSecretStore configured for your provider.
externalSecrets:
  enabled: false
  # Name of the SecretStore or ClusterSecretStore to reference.
  # If storeKind is ClusterSecretStore, the store must already exist.
  storeName: aws-secrets-manager
  storeKind: ClusterSecretStore
  # Refresh interval for syncing secrets from the provider
  refreshInterval: 1h
  # AWS Secrets Manager paths for each secret. These must match the
  # secret names in your AWS Secrets Manager configuration.
  secrets:
    jwtSecret: artifact-keeper/${ENVIRONMENT}/jwt-secret
    dbCredentials: artifact-keeper/${ENVIRONMENT}/db-credentials
    s3Keys: artifact-keeper/${ENVIRONMENT}/s3-keys
    opensearchAuth: artifact-keeper/${ENVIRONMENT}/opensearch-auth
    dtAdminPassword: artifact-keeper/${ENVIRONMENT}/dt-admin-password
    smtpPassword: artifact-keeper/${ENVIRONMENT}/smtp-password
    # MIGRATION_ENCRYPTION_KEY — required at runtime to encrypt
    # source-connection credentials in the migration_jobs table. The
    # AWS SM secret should expose this under the property name
    # `migration-encryption-key`. Leave the value empty to skip the
    # ExternalSecret data entry (set this to a real path to enable).
    migrationEncryptionKey: ""

# -- Network policies
networkPolicy:
  enabled: true

# -- Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

# GKE-specific resources. Only relevant on Google Kubernetes Engine.
gke:
  healthCheckPolicies:
    # -- Render a `networking.gke.io/v1` HealthCheckPolicy per Service so a GKE
    # Gateway BackendService probes the app's real health path instead of `/`
    # (which backend and DependencyTrack return 404 for). Leave disabled on
    # non-GKE installs and on plain Ingress-based GKE.
    enabled: false
    backend:
      # -- Health-check path for the backend BackendService.
      requestPath: /livez
    dependencyTrack:
      # -- Health-check path for the DependencyTrack BackendService.
      requestPath: /api/version
